version: 1
disable_existing_loggers: false

formatters:
  standard:
    format: "%(asctime)s [%(levelname)s] %(name)s: %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"
  rich:
    format: "%(message)s"

handlers:
  console:
    class: rich.logging.RichHandler
    level: INFO
    formatter: rich
    rich_tracebacks: true

  file:
    class: logging.handlers.RotatingFileHandler
    level: DEBUG
    formatter: standard
    filename: "data/logs/app.log"
    maxBytes: 10485760  # 10MB
    backupCount: 3

root:
  level: INFO
  handlers: [console, file]

loggers:
  src:
    level: DEBUG
    propagate: true
  uvicorn:
    level: INFO
    propagate: false
    handlers: [console]
  sentence_transformers:
    level: WARNING
    propagate: false
  implicit:
    level: WARNING
    propagate: false
